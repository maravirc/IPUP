<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turnos de Limpieza</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    .hermanos-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .hermano-card {
      background-color: #ffffff;
      padding: 25px; /* Aumentar el padding para más espacio dentro */
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
      width: 350px; /* Aumentar el tamaño en ancho */
      max-width: 350px; /* Evitar que se estiren demasiado */
      height: 250px; /* Ajustar altura */
    }

    .hermano-card h3 {
      margin: 0;
      color: #333;
      font-size: 22px; /* Aumentar tamaño de texto */
    }

    .hermano-card p {
      margin: 10px 0;
      color: #2a2b2a;
      font-size: 16px; /* Aumentar tamaño de fuente */
    }

    .turno {
      font-weight: bold;
      color: #27ae60;
    }

    .fecha {
      font-size: 16px;
      color: #777;
    }

    .turno-container {
      margin-bottom: 30px;
    }

    .turno-container h3 {
      text-align: center;
      color: #27ae60;
      font-size: 24px; /* Título más grande */
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 12px 20px; /* Aumentar padding */
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 18px; /* Aumentar tamaño de texto */
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #219150;
    }

    @media (max-width: 768px) {
      .hermano-card {
        width: 100%; /* En pantallas pequeñas, los cards ocupan todo el ancho */
        max-width: 100%;
      }

      .turno-container h3 {
        font-size: 18px; /* Reducir tamaño de título en pantallas pequeñas */
      }
    }
  </style>
</head>
<body>

  <h2>Lista de Limpieza</h2>

  <!-- Contenedores para los turnos -->
   <div class="turno-container" id="turnoMartes">
    <h3>Turno Martes</h3>
    <div class="hermanos-container" id="hermanosMartes"></div>
  </div>

  <div class="turno-container" id="turnoJueves">
    <h3>Turno Jueves</h3>
    <div class="hermanos-container" id="hermanosJueves"></div>
  </div>
  <div class="turno-container" id="turnoManana">
    <h3>Turno Domingo Mañana</h3>
    <div class="hermanos-container" id="hermanosManana"></div>
  </div>

  <div class="turno-container" id="turnoTarde">
    <h3>Turno Domingo Tarde</h3>
    <div class="hermanos-container" id="hermanosTarde"></div>
  </div>

  <!-- Botón de exportación -->
  <button onclick="exportarPDF()">Exportar a PDF</button>

  <!-- Incluir html2pdf.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.js"></script>

  <script>
    function formatearFechaBonita(fechaStr) {
      const fecha = new Date(fechaStr);
      const opciones = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
      const fechaFormateada = fecha.toLocaleDateString('es-ES', opciones);
      return fechaFormateada.charAt(0).toUpperCase() + fechaFormateada.slice(1);
    }

    // Lista actualizada de hermanos seleccionados con turnos Martes y Jueves incluidos
    const hermanosSeleccionados = [
      { nombre: "Hno Clemente", turno: "Martes", fecha: "2025-04-23" },
      { nombre: "Hno Jose Espinoza", turno: "Martes", fecha: "2025-04-23" },
      { nombre: "Hno Clemente", turno: "Jueves", fecha: "2025-04-25" },
      { nombre: "Hno Jose Espinoza", turno: "Jueves", fecha: "2025-04-25" },
    ];

    // Contenedores para los turnos
    const contenedorManana = document.getElementById("hermanosManana");
    const contenedorTarde = document.getElementById("hermanosTarde");
    const contenedorMartes = document.getElementById("hermanosMartes");
    const contenedorJueves = document.getElementById("hermanosJueves");

    // Verificar si existen hermanos seleccionados
    if (!hermanosSeleccionados || hermanosSeleccionados.length === 0) {
      document.getElementById("hermanosContainer").innerHTML = "<p>No hay hermanos seleccionados para los turnos.</p>";
    } else {
      // Separar hermanos por turno
      hermanosSeleccionados.forEach(hermano => {
        const card = document.createElement("div");
        card.classList.add("hermano-card");

        card.innerHTML = `
          <h3>${hermano.nombre}</h3>
          <p class="turno">${hermano.turno}</p>
          <p class="fecha">${formatearFechaBonita(hermano.fecha)}</p>
        `;

        // Mostrar el hermano en el turno correspondiente
        if (hermano.turno === "Mañana") {
          contenedorManana.appendChild(card);
        } else if (hermano.turno === "Tarde") {
          contenedorTarde.appendChild(card);
        } else if (hermano.turno === "Martes") {
          contenedorMartes.appendChild(card);
        } else if (hermano.turno === "Jueves") {
          contenedorJueves.appendChild(card);
        }
      });
    }

    // Función para exportar a PDF y abrirlo en una nueva ventana del navegador
    function exportarPDF() {
      const opciones = {
        margin:       1,
        filename:     'turnos_limpieza.pdf',
        html2canvas:  { scale: 2 },
        jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
      };

      const element = document.body; // Exporta toda la página
      html2pdf().from(element).set(opciones).toPdf().get('pdf').then(function (pdf) {
        const pdfUrl = pdf.output('bloburl');
        window.open(pdfUrl, '_blank');
      });
    }
  </script>

</body>
</html>
