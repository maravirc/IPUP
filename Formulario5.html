<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Limpieza</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #333;
    }

    .filtros, .registro {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 20px 0;
      justify-content: center;
    }

    .filtros input, .filtros select, .registro input {
      max-width: 200px;
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    button {
      padding: 10px 20px;
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #219150;
    }

    .tabla-responsive {
      width: 100%;
      overflow-x: auto;
      overflow-y: auto;
      max-height: 400px;
      -webkit-overflow-scrolling: touch;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      margin-top: 20px;
    }

    table {
      width: 100%;
      min-width: 600px;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 15px;
      border-bottom: 1px solid #eee;
      white-space: nowrap;
    }

    th {
      background-color: #2c3e50;
      color: white;
      text-align: left;
    }

    tr:hover {
      background-color: #f1f1f1;
    }

    input[type="text"], input[type="date"], select {
      width: 100%;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    .center {
      text-align: center;
    }

    .limpieza-realizada {
      font-weight: bold;
    }

    .limpieza-realizada.sí {
      color: white;
      background-color: #27ae60; /* Verde cuando se realiza limpieza */
      padding: 5px;
      border-radius: 4px;
    }

    .limpieza-realizada.no {
      color: white;
      background-color: #e74c3c; /* Rojo cuando no se realiza limpieza */
      padding: 5px;
      border-radius: 4px;
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      .filtros, .registro {
        flex-direction: column;
        align-items: center;
      }

      .filtros select, .filtros input, .registro input {
        max-width: 100%;
      }

      table {
        min-width: 600px;
      }
    }
  </style>
</head>
<body>
  <h2>Registro de Limpieza</h2>

  <!-- Tabla -->
  <div class="tabla-responsive">
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Fecha</th>
          <th>Limpieza Realizada</th>
          <th>Comentarios</th> <!-- Columna de Comentarios -->

      <tbody id="tablaUsuarios"></tbody>
    </table>
  </div>

    function crearTabla() {
      const tabla = document.getElementById("tablaUsuarios");
      tabla.innerHTML = "";

      usuarios.forEach((usuario, i) => {
        const fila = document.createElement("tr");

        fila.innerHTML = `
          <td>
            🖊️ <span>${usuario}</span>
          </td>

          </td>

        `;
        tabla.appendChild(fila);
      });
    }

    function actualizarDato(index, campo, valor) {
      if (campo === 'fecha') {
        fechas[index] = valor;
      } else if (campo === 'comentarios') {
        comentarios[index] = valor;
      }
    }

    // Cargar la tabla inicial
    crearTabla();
  </script>
</body>
</html>
